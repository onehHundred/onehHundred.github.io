<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小島直送｜日本什麼都能代購</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #eef7fc;
    --bg-2: #dcedf7;
    --ink: #1c3a4f;
    --ink-soft: #52738a;
    --indigo: #2b7fbf;
    --stamp: #f2a93c;
    --kraft: #a8c5d6;
    --gold: #f2a93c;
    --paper-line: rgba(28,58,79,0.12);
    --radius: 2px;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .mono{ font-family:'Space Mono', monospace; letter-spacing: 0.02em; }
  h1,h2,h3{ font-family:'Noto Serif TC', serif; margin:0; }
  a{ color:inherit; }
  img{ max-width:100%; display:block; }

  body::before{
    content:"";
    position: fixed; inset:0;
    pointer-events:none;
    z-index: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--paper-line) 40px);
    opacity:0.5;
  }

  .wrap{ max-width: 1080px; margin: 0 auto; padding: 0 24px; position:relative; z-index:1; }

  header.site{
    position: sticky; top:0; z-index: 50;
    background: rgba(238,247,252,0.92);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--paper-line);
  }
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding: 16px 24px; max-width: 1080px; margin:0 auto;
    position: relative;
  }
  .brand{
    font-family:'Noto Serif TC', serif; font-weight:900; font-size: 1.25rem;
    display:flex; align-items:center; gap:10px;
  }
  .brand .dot{ width:8px; height:8px; border-radius:50%; background: var(--stamp); display:inline-block; }
  .nav-links{ display:flex; gap: 28px; font-size:0.92rem; }
  .nav-links a{ text-decoration:none; color: var(--ink-soft); position:relative; padding-bottom:3px; }
  .nav-links a:hover, .nav-links a:focus-visible{ color: var(--ink); }
  .nav-links a::after{
    content:""; position:absolute; left:0; bottom:0; width:0; height:1px; background: var(--stamp);
    transition: width 0.25s ease;
  }
  .nav-links a:hover::after{ width:100%; }

  .nav-toggle{
    display:none; background:none; border:none; padding:6px; cursor:pointer;
    flex-direction:column; gap:5px; width:32px;
  }
  .nav-toggle span{ display:block; height:2px; background: var(--ink); border-radius:2px; transition: transform 0.2s ease, opacity 0.2s ease; }
  .nav-toggle.open span:nth-child(1){ transform: translateY(7px) rotate(45deg); }
  .nav-toggle.open span:nth-child(2){ opacity:0; }
  .nav-toggle.open span:nth-child(3){ transform: translateY(-7px) rotate(-45deg); }

  @media (max-width: 680px){
    .nav-toggle{ display:flex; }
    .nav-links{
      display:none; position:absolute; top:100%; left:0; right:0;
      flex-direction:column; gap:0; background: #fdfeff;
      border-bottom: 1px solid var(--paper-line);
      box-shadow: 0 12px 20px rgba(28,58,79,0.08);
    }
    .nav-links.open{ display:flex; }
    .nav-links a{ padding: 16px 24px; border-bottom: 1px solid var(--paper-line); }
    .nav-links a::after{ display:none; }
  }

  .tag{
    position: relative;
    background: #fdfeff;
    border: 1px solid var(--paper-line);
    clip-path: polygon(14% 0%, 100% 0%, 100% 100%, 14% 100%, 0% 50%);
    box-shadow: 0 10px 24px rgba(34,48,63,0.10);
  }
  .tag::before{
    content:"";
    position:absolute; left: 6%; top:50%; transform: translateY(-50%);
    width:14px; height:14px; border-radius:50%;
    background: var(--bg);
    border: 1.5px solid var(--kraft);
  }
  .tag::after{
    content:"";
    position:absolute; left:14%; top:0; bottom:0; width:0;
    border-left: 1.5px dashed var(--kraft);
  }

  .hero{ padding: 96px 0 72px; }
  .hero-grid{ display:grid; grid-template-columns: 1fr; gap: 40px; align-items:center; }
  .string{
    width: 2px; height: 56px; margin: 0 0 0 40px;
    background: repeating-linear-gradient(180deg, var(--kraft) 0 6px, transparent 6px 10px);
  }
  .hero-tag{ padding: 44px 40px 44px 64px; max-width: 640px; }
  .eyebrow{
    font-size: 0.8rem; letter-spacing: 0.14em; color: var(--stamp);
    text-transform: uppercase; margin-bottom: 14px; display:inline-block;
  }
  .hero h1{
    font-size: clamp(2.1rem, 4.6vw, 3.4rem);
    font-weight: 900; color: var(--indigo); line-height:1.25;
  }
  .hero p.lead{
    margin-top: 20px; font-size: 1.05rem; color: var(--ink-soft); max-width: 46ch;
  }
  .hero-cta{ margin-top: 32px; display:flex; gap:14px; flex-wrap:wrap; }

  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding: 13px 26px; border-radius: var(--radius);
    text-decoration:none; font-weight:700; font-size:0.95rem;
    border: 1.5px solid var(--ink);
    transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
    cursor:pointer;
  }
  .btn-primary{ background: var(--stamp); border-color: var(--stamp); color:#ffffff; }
  .btn-primary:hover, .btn-primary:focus-visible{ transform: translateY(-2px); background:#d9932a; }
  .btn-ghost{ background:transparent; color: var(--ink); }
  .btn-ghost:hover, .btn-ghost:focus-visible{ transform: translateY(-2px); background: var(--ink); color:#ffffff; }
  .btn:focus-visible{ outline: 2px solid var(--indigo); outline-offset: 3px; }

  .section{ padding: 84px 0; border-top: 1px solid var(--paper-line); }
  .section-head{ margin-bottom: 48px; max-width: 640px; }
  .label-tag{
    display:inline-flex; align-items:center; padding: 6px 18px 6px 26px;
    font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase;
    color: var(--indigo); margin-bottom: 18px;
  }
  .section h2{ font-size: clamp(1.6rem, 3vw, 2.2rem); color: var(--ink); }
  .section .sub{ color: var(--ink-soft); margin-top:12px; font-size:0.98rem; }

  .steps{ display:grid; gap: 0; }
  .step{
    display:grid; grid-template-columns: 90px 1fr; gap: 24px;
    padding: 28px 0; border-bottom: 1px solid var(--paper-line);
    opacity:0; transform: translateY(14px);
    transition: opacity 0.55s ease, transform 0.55s ease;
  }
  .step.in{ opacity:1; transform:none; }
  .step:last-child{ border-bottom:none; }
  .step-num{
    font-family:'Space Mono', monospace; font-weight:700; font-size:1.6rem;
    color: var(--stamp); opacity:0.85;
  }
  .step h3{ font-size:1.08rem; color: var(--ink); margin-bottom:6px; }
  .step p{ color: var(--ink-soft); margin:0; font-size:0.95rem; max-width: 58ch; }

  .product-controls{ margin-bottom:28px; display:flex; flex-direction:column; gap:16px; }
  .search-box{ position:relative; max-width:360px; }
  .search-box input{
    width:100%; padding:12px 16px 12px 40px; border:1px solid var(--paper-line);
    border-radius: var(--radius); background:#fdfeff; font-family:'Noto Sans TC', sans-serif;
    font-size:0.95rem; color: var(--ink);
  }
  .search-box input::placeholder{ color: var(--kraft); }
  .search-box input:focus{ outline: 2px solid var(--indigo); outline-offset: 1px; border-color: var(--indigo); }
  .search-box svg{ position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; }
  .search-box svg path, .search-box svg circle{ stroke: var(--kraft); }
  .filter-chips{ display:flex; flex-wrap:wrap; gap:10px; }
  .chip{
    padding:7px 16px; border:1px solid var(--paper-line); border-radius:999px;
    background:#fdfeff; font-size:0.85rem; color: var(--ink-soft);
    cursor:pointer; transition: all 0.18s ease; font-family:'Noto Sans TC', sans-serif;
    text-decoration:none; display:inline-block;
  }
  .chip:hover{ border-color: var(--indigo); color: var(--ink); }
  .chip.active{ background: var(--indigo); border-color: var(--indigo); color:#ffffff; }
  .no-results{ color: var(--ink-soft); font-size:0.95rem; padding: 20px 0; }
  .teaser-cta{ margin-top: 28px; }

  .product-grid{
    display:grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 24px;
  }
  .product-card{
    background:#fdfeff; border:1px solid var(--paper-line); border-radius: var(--radius);
    overflow:hidden;
    opacity:0; transform: translateY(14px);
    transition: opacity 0.55s ease, transform 0.55s ease, box-shadow 0.2s ease;
  }
  .product-card.in{ opacity:1; transform:none; }
  .product-card:hover{ box-shadow: 0 14px 28px rgba(31,51,39,0.12); }
  .product-photo{
    width:100%; aspect-ratio: 1 / 1; object-fit: cover;
    background: var(--bg-2); border-bottom: 1px solid var(--paper-line);
  }
  .product-body{ padding: 18px 20px 22px; }
  .product-tag{ font-size:0.7rem; color: var(--kraft); display:block; margin-bottom:8px; }
  .product-body h3{ font-size:1.02rem; color: var(--ink); }
  .product-meta{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--paper-line);
  }
  .product-price{ font-size:1.15rem; font-weight:700; color: var(--indigo); }
  .product-price span{ font-size:0.72rem; color: var(--ink-soft); font-weight:400; display:block; margin-bottom:2px; }
  .product-time{ text-align:right; font-size:0.78rem; color: var(--ink-soft); }
  .product-time span{ display:block; font-size:0.68rem; color: var(--kraft); margin-bottom:2px; }

  .notes{
    background: var(--bg-2); border: 1px solid var(--paper-line);
    padding: 32px 32px; border-radius: var(--radius);
  }
  .notes ul{ margin:0; padding-left: 1.1em; color: var(--ink-soft); }
  .notes li{ margin-bottom: 10px; font-size:0.94rem; }
  .notes li::marker{ color: var(--stamp); }

  .contact-grid{
    display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px; margin-top: 12px;
  }
  .contact-item{
    text-align:center; padding: 30px 22px;
    background:#fdfeff; border:1px solid var(--paper-line); border-radius: 18px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .contact-item:hover{ transform: translateY(-4px); box-shadow: 0 14px 26px rgba(28,58,79,0.10); }
  .contact-icon{
    width:52px; height:52px; margin:0 auto 16px;
    border-radius:16px; background: var(--bg-2);
    display:flex; align-items:center; justify-content:center;
    color: var(--indigo);
  }
  .contact-icon svg{ width:24px; height:24px; }
  .contact-platform{ font-size:0.7rem; color: var(--kraft); display:block; }
  .contact-item h3{ font-size:1.1rem; margin-top:6px; color: var(--indigo); }
  .contact-item p{ color: var(--ink-soft); font-size:0.88rem; margin-top:8px; }

  footer{
    padding: 40px 0 60px; text-align:center; color: var(--ink-soft); font-size:0.85rem;
    border-top: 1px solid var(--paper-line);
  }

  .skeleton{ opacity:0.5; font-size:0.85rem; color: var(--ink-soft); padding: 12px 0; }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    .step, .product-card{ transition:none; opacity:1; transform:none; }
  }

  @media (max-width: 620px){
    .hero{ padding: 56px 0 48px; }
    .hero-tag{ padding: 32px 24px 32px 44px; }
    .tag::before{ left: 10%; width:11px; height:11px; }
    .tag::after{ left: 20%; }
    .tag{ clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 20% 100%, 0% 50%); }
    .section{ padding: 56px 0; }
    .hero-cta{ flex-direction:column; align-items:stretch; }
    .hero-cta .btn{ justify-content:center; }
    .step{ grid-template-columns: 48px 1fr; gap: 14px; }
    .step-num{ font-size:1.2rem; }
    .contact-grid{ grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 400px){
    .contact-grid{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site">
  <div class="nav">
    <div class="brand"><span class="dot"></span>小島直送</div>
    <nav class="nav-links" id="nav-links">
      <a href="process.html">代購流程</a>
      <a href="products.html">商品範例</a>
      <a href="notes.html">須知</a>
      <a href="#contact">聯絡我</a>
    </nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-links">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<section class="hero">
  <div class="wrap hero-grid">
    <div>
      <div class="string"></div>
      <div class="tag hero-tag">
        <span class="eyebrow mono" id="hero-eyebrow"></span>
        <h1 id="hero-title"></h1>
        <p class="lead" id="hero-lead"></p>
        <div class="hero-cta">
          <a class="btn btn-primary" href="#contact" id="hero-cta-primary"></a>
          <a class="btn btn-ghost" href="process.html" id="hero-cta-secondary"></a>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="section" id="categories">
  <div class="wrap">
    <div class="section-head">
      <span class="label-tag mono">WHAT WE SOURCE</span>
      <h2>商品範例</h2>
      <p class="sub">美妝、服飾、3C、零食、雜貨——什麼都能代購。點分類看範例，或直接逛全部商品。</p>
    </div>
    <div class="filter-chips" id="teaser-chips"></div>
    <div class="teaser-cta">
      <a class="btn btn-primary" href="products.html">查看全部商品</a>
    </div>
  </div>
</section>

<section class="section" id="contact">
  <div class="wrap">
    <div class="section-head">
      <span class="label-tag mono">GET IN TOUCH</span>
      <h2>準備好了嗎？私訊我開始下單</h2>
      <p class="sub">選一個你常用的平台，傳商品連結或截圖給我就可以開始報價。</p>
    </div>
    <div class="contact-grid" id="contact-grid"></div>
  </div>
</section>

<footer>
  <div class="wrap">小島直送｜日本代購服務 — 本頁面內容僅供參考，請依實際服務調整</div>
</footer>

<script>
  // ---------- 預設資料（讀取失敗時的備用內容，例如直接雙擊開檔案時）----------
  const FALLBACK = {
    hero: {
      eyebrow: "JAPAN PROXY SHOPPING",
      title: "日本什麼都能代購，你想要的，我幫你帶回來",
      lead: "不管是美妝藥妝、服飾配件、3C家電還是生活雜貨——只要在日本買得到，傳連結或截圖給我，剩下的交給我處理。",
      cta_primary: "私訊我下單",
      cta_secondary: "看代購流程"
    },
    steps: [
      { title: "傳訊息告訴我想要的商品", description: "商品連結、截圖，或是店名＋品項都可以，越清楚我越好幫你確認庫存與價格。" },
      { title: "我會回報總金額", description: "商品金額＋日本境內運費＋代購服務費＋國際運費，一次算給你看，確認沒問題才會下單。" },
      { title: "確認訂單並匯款", description: "收到款項後我才會實際下單購買，避免商品缺貨或臨時漲價造成落差。" },
      { title: "日本購買、檢查、打包", description: "商品到貨後我會拍照確認狀況，有問題會立刻跟你說，沒問題才會進行打包。" },
      { title: "國際寄出＋到貨通知", description: "出貨後提供追蹤編號，讓你隨時查詢包裹狀態，抵台後也會主動通知你。" }
    ],
    products: [
      { enabled: true, category: "BEAUTY", name: "商品名稱（例：藥妝保養品）", photo: "", price: "NT$ 000", eta: "7–10 個工作天" },
      { enabled: true, category: "FASHION", name: "商品名稱（例：服飾配件）", photo: "", price: "NT$ 000", eta: "7–10 個工作天" },
      { enabled: true, category: "ELECTRONICS", name: "商品名稱（例：3C家電）", photo: "", price: "NT$ 000", eta: "7–10 個工作天" }
    ],
    notes: [
      "報價以「下單當下」的日幣匯率計算，正式下單後若匯率有變動會提前告知。",
      "代購服務費依商品類型與金額而定，會在報價時一併列出，確認金額無誤再匯款。",
      "商品到貨後會拍照確認狀態，若有明顯瑕疵會立即反映，恕無法接受下單後的個人喜好退換貨。"
    ],
    contact: [
      { enabled: true, platform: "INSTAGRAM", handle: "@your_ig_id", note: "私訊或限動回覆都可以" },
      { enabled: true, platform: "LINE", handle: "LINE ID：your_line_id", note: "加好友後直接傳連結即可" }
    ]
  };

  const navToggle = document.getElementById('nav-toggle');
  const navLinks = document.getElementById('nav-links');
  navToggle.addEventListener('click', () => {
    const isOpen = navLinks.classList.toggle('open');
    navToggle.classList.toggle('open', isOpen);
    navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });
  navLinks.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      navLinks.classList.remove('open');
      navToggle.classList.remove('open');
      navToggle.setAttribute('aria-expanded', 'false');
    });
  });

  function esc(str){
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }

  function getPlatformIcon(platform){
    const p = (platform || '').toLowerCase();
    if (p.includes('line')) {
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5C6.98 3.5 3 6.86 3 11c0 3.7 3.16 6.78 7.43 7.4-.1.4-.53 2-.6 2.32-.1.4.15.4.31.29.13-.09 2.07-1.4 2.9-1.97.63.09 1.29.14 1.96.14 5.02 0 9-3.36 9-7.5s-3.98-7.68-9-7.68Z"/></svg>';
    }
    if (p.includes('insta') || p === 'ig') {
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="0.6" fill="currentColor" stroke="none"/></svg>';
    }
    if (p.includes('face') || p === 'fb') {
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="8.5"/><path d="M13.8 8.2h-1.1a1.6 1.6 0 0 0-1.6 1.6v1.6H9.4v2.1h1.7V19h2.1v-5.5h1.7l.3-2.1h-2v-1.3c0-.4.3-.6.6-.6h1.4V8.2Z" fill="currentColor" stroke="none"/></svg>';
    }
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-8.4 8.4 8.3 8.3 0 0 1-3.8-.9L3 21l1.9-5.8a8.3 8.3 0 0 1-.9-3.7A8.4 8.4 0 0 1 12.6 3a8.4 8.4 0 0 1 8.4 8.5Z"/></svg>';
  }

  let ALL_PRODUCTS = [];

  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  }, { threshold: 0.15 });

  function renderTeaserChips(){
    const cats = Array.from(new Set(
      ALL_PRODUCTS.filter(p => p.enabled !== false).map(p => p.category).filter(Boolean)
    ));
    const chipsEl = document.getElementById('teaser-chips');
    chipsEl.innerHTML = cats.map(c => `<a class="chip" href="products.html?cat=${encodeURIComponent(c)}">${esc(c)}</a>`).join('');
  }

  function render(data){
    // Hero
    document.getElementById('hero-eyebrow').textContent = data.hero?.eyebrow || '';
    document.getElementById('hero-title').textContent = data.hero?.title || '';
    document.getElementById('hero-lead').textContent = data.hero?.lead || '';
    document.getElementById('hero-cta-primary').textContent = data.hero?.cta_primary || '私訊我下單';
    document.getElementById('hero-cta-secondary').textContent = data.hero?.cta_secondary || '看代購流程';

    // 商品分類導覽（首頁只顯示分類卡片，完整商品清單在 products.html）
    ALL_PRODUCTS = data.products || [];
    renderTeaserChips();

    // Contact (只顯示 enabled 不是 false 的平台)
    const contactEl = document.getElementById('contact-grid');
    const visibleContacts = (data.contact || []).filter(c => c.enabled !== false);
    contactEl.innerHTML = visibleContacts.map(c => `
      <div class="contact-item">
        <div class="contact-icon">${getPlatformIcon(c.platform)}</div>
        <span class="mono contact-platform">${esc(c.platform)}</span>
        <h3>${esc(c.handle)}</h3>
        <p>${esc(c.note)}</p>
      </div>
    `).join('');
  }

  fetch('./data/site.json', { cache: 'no-store' })
    .then(res => { if(!res.ok) throw new Error('no data file'); return res.json(); })
    .then(data => render(data))
    .catch(() => render(FALLBACK));
</script>

</body>
</html>
