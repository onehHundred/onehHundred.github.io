<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下單前須知｜小島直送</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #eef7fc;
    --bg-2: #dcedf7;
    --ink: #1c3a4f;
    --ink-soft: #52738a;
    --indigo: #2b7fbf;
    --stamp: #f2a93c;
    --kraft: #a8c5d6;
    --gold: #f2a93c;
    --paper-line: rgba(28,58,79,0.12);
    --radius: 2px;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .mono{ font-family:'Space Mono', monospace; letter-spacing: 0.02em; }
  h1,h2,h3{ font-family:'Noto Serif TC', serif; margin:0; }
  a{ color:inherit; }

  body::before{
    content:"";
    position: fixed; inset:0;
    pointer-events:none;
    z-index: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--paper-line) 40px);
    opacity:0.5;
  }

  .wrap{ max-width: 1080px; margin: 0 auto; padding: 0 24px; position:relative; z-index:1; }

  header.site{
    position: sticky; top:0; z-index: 50;
    background: rgba(238,247,252,0.92);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--paper-line);
  }
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding: 16px 24px; max-width: 1080px; margin:0 auto;
    position: relative;
  }
  .brand{
    font-family:'Noto Serif TC', serif; font-weight:900; font-size: 1.25rem;
    display:flex; align-items:center; gap:10px;
  }
  .brand .dot{ width:8px; height:8px; border-radius:50%; background: var(--stamp); display:inline-block; }
  .nav-links{ display:flex; gap: 28px; font-size:0.92rem; }
  .nav-links a{ text-decoration:none; color: var(--ink-soft); position:relative; padding-bottom:3px; }
  .nav-links a:hover, .nav-links a:focus-visible{ color: var(--ink); }
  .nav-links a.current{ color: var(--ink); }
  .nav-links a::after{
    content:""; position:absolute; left:0; bottom:0; width:0; height:1px; background: var(--stamp);
    transition: width 0.25s ease;
  }
  .nav-links a:hover::after, .nav-links a.current::after{ width:100%; }

  .nav-toggle{
    display:none; background:none; border:none; padding:6px; cursor:pointer;
    flex-direction:column; gap:5px; width:32px;
  }
  .nav-toggle span{ display:block; height:2px; background: var(--ink); border-radius:2px; transition: transform 0.2s ease, opacity 0.2s ease; }
  .nav-toggle.open span:nth-child(1){ transform: translateY(7px) rotate(45deg); }
  .nav-toggle.open span:nth-child(2){ opacity:0; }
  .nav-toggle.open span:nth-child(3){ transform: translateY(-7px) rotate(-45deg); }

  @media (max-width: 680px){
    .nav-toggle{ display:flex; }
    .nav-links{
      display:none; position:absolute; top:100%; left:0; right:0;
      flex-direction:column; gap:0; background: #fdfeff;
      border-bottom: 1px solid var(--paper-line);
      box-shadow: 0 12px 20px rgba(28,58,79,0.08);
    }
    .nav-links.open{ display:flex; }
    .nav-links a{ padding: 16px 24px; border-bottom: 1px solid var(--paper-line); }
    .nav-links a::after{ display:none; }
  }

  .page-head{ padding: 64px 0 16px; }
  .label-tag{
    display:inline-flex; align-items:center; padding: 6px 18px 6px 0;
    font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase;
    color: var(--indigo); margin-bottom: 18px;
  }
  .page-head h1{ font-size: clamp(1.8rem, 4vw, 2.6rem); color: var(--ink); }
  .page-head p.sub{ color: var(--ink-soft); margin-top:14px; font-size:1rem; max-width: 56ch; }

  .section{ padding: 32px 0 84px; }

  .notes{
    background: #fdfeff; border: 1px solid var(--paper-line);
    padding: 36px 36px; border-radius: var(--radius);
  }
  .notes ul{ margin:0; padding-left: 1.1em; color: var(--ink-soft); }
  .notes li{ margin-bottom: 14px; font-size:0.98rem; }
  .notes li::marker{ color: var(--stamp); }

  .back-cta{ margin-top: 40px; display:flex; gap:14px; flex-wrap:wrap; }
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding: 13px 26px; border-radius: var(--radius);
    text-decoration:none; font-weight:700; font-size:0.95rem;
    border: 1.5px solid var(--ink);
    transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
  }
  .btn-primary{ background: var(--stamp); border-color: var(--stamp); color:#ffffff; }
  .btn-primary:hover, .btn-primary:focus-visible{ transform: translateY(-2px); background:#d9932a; }
  .btn-ghost{ background:transparent; color: var(--ink); }
  .btn-ghost:hover, .btn-ghost:focus-visible{ transform: translateY(-2px); background: var(--ink); color:#ffffff; }

  footer{
    padding: 40px 0 60px; text-align:center; color: var(--ink-soft); font-size:0.85rem;
    border-top: 1px solid var(--paper-line);
  }
  .skeleton{ opacity:0.5; font-size:0.85rem; color: var(--ink-soft); padding: 12px 0; }

  @media (max-width: 620px){
    .page-head{ padding: 40px 0 8px; }
    .section{ padding: 24px 0 56px; }
    .notes{ padding: 26px 22px; }
    .back-cta{ flex-direction:column; align-items:stretch; }
    .back-cta .btn{ justify-content:center; }
  }
</style>
</head>
<body>

<header class="site">
  <div class="nav">
    <a href="index.html" class="brand"><span class="dot"></span>小島直送</a>
    <nav class="nav-links" id="nav-links">
      <a href="process.html">代購流程</a>
      <a href="products.html">商品範例</a>
      <a href="notes.html" class="current">須知</a>
      <a href="index.html#contact">聯絡我</a>
    </nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="開啟選單" aria-expanded="false" aria-controls="nav-links">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<section class="page-head">
  <div class="wrap">
    <span class="label-tag mono">BEFORE YOU ORDER</span>
    <h1>下單前須知</h1>
    <p class="sub">正式下單前先看過這些，遇到問題比較不會有誤會。</p>
  </div>
</section>

<section class="section">
  <div class="wrap">
    <div class="notes">
      <ul id="notes-list"><li class="skeleton">載入中…</li></ul>
    </div>
    <div class="back-cta">
      <a class="btn btn-primary" href="index.html#contact">私訊我下單</a>
      <a class="btn btn-ghost" href="index.html">回首頁</a>
    </div>
  </div>
</section>

<footer>
  <div class="wrap">小島直送｜日本代購服務 — 本頁面內容僅供參考，請依實際服務調整</div>
</footer>

<script>
  const FALLBACK_NOTES = [
    "報價以「下單當下」的日幣匯率計算，正式下單後若匯率有變動會提前告知。",
    "代購服務費依商品類型與金額而定，會在報價時一併列出，確認金額無誤再匯款。",
    "商品到貨後會拍照確認狀態，若有明顯瑕疵會立即反映，恕無法接受下單後的個人喜好退換貨。",
    "因季節、店鋪庫存或廠商出貨速度不同，實際到貨天數會提前跟你說明預估區間。",
    "國際運費依重量／材積計算，多樣商品可以合併包裹節省運費，會在報價時建議合併方式。"
  ];

  function esc(str){
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }

  const navToggle = document.getElementById('nav-toggle');
  const navLinks = document.getElementById('nav-links');
  navToggle.addEventListener('click', () => {
    const isOpen = navLinks.classList.toggle('open');
    navToggle.classList.toggle('open', isOpen);
    navToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });

  function renderNotes(notes){
    document.getElementById('notes-list').innerHTML = (notes || []).map(n => `<li>${esc(n)}</li>`).join('');
  }

  fetch('./data/site.json', { cache: 'no-store' })
    .then(res => { if(!res.ok) throw new Error('no data file'); return res.json(); })
    .then(data => renderNotes(data.notes && data.notes.length ? data.notes : FALLBACK_NOTES))
    .catch(() => renderNotes(FALLBACK_NOTES));
</script>

</body>
</html>
